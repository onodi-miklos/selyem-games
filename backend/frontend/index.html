<!doctype html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kezdőoldal</title>
    <link rel="stylesheet" href="./index.css" />
    <script src="./dist/index.js" type="module" defer></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>
    </head>
    <body>
        <h1 id="cim">Selyem Games</h1>
        <h2 class="alcim">202<span>6(7)</span> legnagyobbja:</h2>
        <h2 class="alcim" id="up">a Selyem Studio által</h2>
        <button id="startBtn">LET'S GO</button>
        <img id="credit" src="./images/selyem-studio.png" alt="Selyem Studio" />

        <div class="negyzet"></div>
        <div class="kor"></div>


        <div id="cover"></div>
        <div id="signup" class="modal">
            <div id="buttonHolder">
                <button type="button" id="closeBtn" aria-label="Bezárás">×</button>
            </div>
        <form>
        <label for="nameField">Adj nevet magadnak:</label>
            <input required type="text" id="nameField" placeholder="név" maxlength="16"/>
        
        <h1>Szabd személyre a karaktered:</h1>
        <div id="container">
            <button type="button" id="hajPrev"><</button>
            <div class="item" id="haj"></div>
            <button type="button" id="hajNext">></button>

            <button type="button" id="arcPrev"><</button>
            <div class="item" id="arc"></div>
            <button type="button" id="arcNext">></button>

            <button type="button" id="szinPrev"><</button>
            <div class="item" id="szin"></div>
            <button type="button" id="szinNext">></button>

            <div class="preview-fullrow">
                <div id="preview" class="item preview-host"></div>
            </div>

            </div>

            <input id="submitBtn" type="submit" value="Tovább" />
        </form>
        </div>
    </body>
</html>
