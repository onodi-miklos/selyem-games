<!DOCTYPE html>
<html lang="en">
<head>

  <title>Szobák</title>
  <link rel="stylesheet" href="./rooms.css">
  <script type="module" src="./dist/rooms.js" defer></script>

<body>
  <header>

    <div id="you">

  <div id="container">

      <h1>+</h1>

      <h2><h2>

        <div>

    </div>
